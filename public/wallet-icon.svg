  <!-- Coin circle inside pocket -->
  <circle cx="361" cy="265" r="28" fill="#6ee7b7"/>
  <!-- Card lines inside wallet -->
  <rect x="120" y="240" width="160" height="14" rx="7" fill="#d1fae5"/>
  <rect x="120" y="268" width="110" height="14" rx="7" fill="#d1fae5"/>
