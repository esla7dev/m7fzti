  <rect x="100" y="160" width="312" height="210" rx="24" ry="24" fill="#ffffff"/>
  <!-- Wallet top flap -->
  <rect x="100" y="160" width="312" height="60" rx="24" ry="24" fill="#d1fae5"/>
  <!-- Coin slot / pocket -->
