<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>غير متصل - م7فظتي</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f9fafb;
      color: #111827;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1.5rem;
      text-align: center;
    }
    .container { max-width: 360px; }
    .icon {
      width: 80px; height: 80px; margin: 0 auto 1.5rem;
      background: #fef3c7; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 2.5rem;
    }
    h1 { font-size: 1.5rem; margin-bottom: .5rem; color: #1f2937; }
    p { color: #6b7280; line-height: 1.6; margin-bottom: 1.5rem; }
    button {
      background: #10b981; color: #fff; border: none; border-radius: .5rem;
      padding: .75rem 2rem; font-size: 1rem; cursor: pointer;
      min-height: 44px; min-width: 44px;
    }
    button:active { background: #059669; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>لا يوجد اتصال بالإنترنت</h1>
    <p>يبدو أنك غير متصل بالإنترنت. تحقق من اتصالك وحاول مرة أخرى.</p>
    <button onclick="location.reload()">إعادة المحاولة</button>
  </div>
</body>
</html>
